        { q: "What command prefix exposes the query execution plan chosen by the database optimization engine?", a: "EXPLAIN SELECT", o: ["VERIFY SELECT", "EXPLAIN SELECT", "SHOW TREE SELECT", "OPTIMIZE NOW SELECT"], c: "Query Optimization" },

    let currentQuestionIndex = 0;
    let userScore = 0;
    let isAnswered = false;

    // Initialize Quiz
    window.onload = function() {
        showQuestion();
    };

    function showQuestion() {
        isAnswered = false;
        
        // Update displays
        document.getElementById('progress-display').innerText = `Question ${currentQuestionIndex + 1} / ${quizData.length}`;
        document.getElementById('score-display').innerText = `Score: ${userScore}`;
        
        const currentData = quizData[currentQuestionIndex];
        document.getElementById('category-display').innerText = currentData.c;
        document.getElementById('question-display').innerText = currentData.q;
        
        // Hide feedback panels & next actions
        const feedbackBox = document.getElementById('feedback-box');
        feedbackBox.style.display = 'none';
        feedbackBox.className = 'feedback-panel';
        document.getElementById('next-button').style.display = 'none';

        // Display multiple choice selection options
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';
        
        currentData.o.forEach(option => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = option;
            button.onclick = function() { checkAnswer(button, option); };
            optionsBox.appendChild(button);
        });
    }

    function checkAnswer(selectedButton, selectedText) {
        if (isAnswered) return; // Freeze selections once clicked
        isAnswered = true;

        const currentData = quizData[currentQuestionIndex];
        const optionsBox = document.getElementById('options-box');
        const buttons = optionsBox.getElementsByClassName('option-btn');
        const feedbackBox = document.getElementById('feedback-box');
        const nextButton = document.getElementById('next-button');

        // Disable all buttons to freeze screen state
        for (let btn of buttons) {
            btn.disabled = true;
            // Mark the absolute correct option implicitly for study view
            if (btn.innerText === currentData.a) {
                btn.classList.add('correct');
            }
        }

        // Evaluate validation logic
        if (selectedText === currentData.a) {
            userScore++;
            document.getElementById('score-display').innerText = `Score: ${userScore}`;
            feedbackBox.innerText = "Correct! Great understanding of the topic concept.";
            feedbackBox.classList.add('correct-msg');
        } else {
            selectedButton.classList.add('incorrect');
            feedbackBox.innerText = `Incorrect. The absolute correct choice was: "${currentData.a}"`;
            feedbackBox.classList.add('incorrect-msg');
        }

        feedbackBox.style.display = 'block';
        nextButton.style.display = 'block';
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('results-box').style.display = 'block';
        
        const finalScoreBox = document.getElementById('final-score-display');
        finalScoreBox.innerText = `${userScore} / ${quizData.length}`;
        
        const commentBox = document.getElementById('final-comment-display');
        const percentage = (userScore / quizData.length) * 100;
        if (percentage >= 90) {
            commentBox.innerText = "Master tier! Outstanding comprehension of database technologies and information management concepts.";
        } else if (percentage >= 70) {
            commentBox.innerText = "Great job! You passed the assessment review successfully.";
        } else {
            commentBox.innerText = "Keep reviewing your core course resources and notes to strengthen knowledge points.";
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        userScore = 0;
        document.getElementById('results-box').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        showQuestion();
    }
</script>
